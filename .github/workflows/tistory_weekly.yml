name: Publish Weekly Tistory Update

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install chromium

      - name: Publish weekly Tistory post
        env:
          TISTORY_BLOG_NAME: ${{ secrets.TISTORY_BLOG_NAME }}
          TISTORY_STORAGE_STATE_B64: ${{ secrets.TISTORY_STORAGE_STATE_B64 }}
          GITHUB_REPO_URL: https://github.com/${{ github.repository }}
        run: |
          python scripts/publish_tistory_weekly.py --blog-name "$TISTORY_BLOG_NAME" --import-state-b64 "$TISTORY_STORAGE_STATE_B64"
          python scripts/publish_tistory_weekly.py --blog-name "$TISTORY_BLOG_NAME" --publish
